upstream api_server {
    server api-server:3001;
}

upstream inspector_ui {
    server inspector:80;
}

server {
    listen 80;
    server_name _;

    # Forward real client IP from upstream proxies (e.g. Cloudflare, load balancer)
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Increase buffer sizes for API responses that may carry large payloads
    proxy_buffer_size          16k;
    proxy_buffers              8 16k;
    proxy_busy_buffers_size    32k;

    # --- API traffic (/api/...) → api-server ---
    location /api/ {
        proxy_pass         http://api_server;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow streaming responses and long-running requests
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_buffering     off;
    }

    # --- Everything else → Inspector UI (SPA) ---
    location / {
        proxy_pass         http://inspector_ui;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Return 444 (no response) for requests without a Host header
    if ($host = "") {
        return 444;
    }
}
