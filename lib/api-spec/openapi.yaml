openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Memory Subsystem API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ingest
    description: Ingest raw text into the memory
  - name: notes
    description: Read structured notes
  - name: search
    description: Search structured notes
  - name: context
    description: Build context bundles for downstream agents
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ingest/text:
    post:
      operationId: ingestText
      tags: [ingest]
      summary: Ingest a raw text item and produce one or more structured notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestTextRequest"
      responses:
        "200":
          description: Notes produced from the raw item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestTextResponse"
  /notes/{id}:
    get:
      operationId: getNote
      tags: [notes]
      summary: Get a single note by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The requested note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /search:
    post:
      operationId: searchNotes
      tags: [search]
      summary: Search structured notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
  /context/build:
    post:
      operationId: buildContext
      tags: [context]
      summary: Build a context bundle for a downstream agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildContextRequest"
      responses:
        "200":
          description: Context bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildContextResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
    NoteType:
      type: string
      enum: [raw_source, note, insight, decision, synthesis, entity]
    SearchMode:
      type: string
      enum: [lexical, semantic, hybrid]
      description: "lexical: FTS only; semantic: vector similarity only; hybrid: RRF fusion of FTS + semantic (default)"
    Entity:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          description: e.g. person, project, concept, place, organization
        name:
          type: string
      required: [id, type, name]
    Note:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/NoteType"
        title:
          type: string
        body:
          type: string
        summary:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        sourceItemId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        entities:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
      required: [id, type, title, body, tags, createdAt, entities]
    IngestTextRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
        source:
          type: string
          nullable: true
          description: Optional free-form label of the source (e.g. "chat", "email")
        author:
          type: string
          nullable: true
      required: [text]
    IngestTextResponse:
      type: object
      properties:
        rawItemId:
          type: string
        notes:
          type: array
          items:
            $ref: "#/components/schemas/Note"
      required: [rawItemId, notes]
    SearchRequest:
      type: object
      properties:
        query:
          type: string
          minLength: 1
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        types:
          type: array
          items:
            $ref: "#/components/schemas/NoteType"
          nullable: true
        mode:
          $ref: "#/components/schemas/SearchMode"
          default: hybrid
          description: "Retrieval mode. Defaults to hybrid (RRF fusion of FTS + semantic). Existing clients omitting this field continue to work unchanged."
      required: [query]
    SearchHit:
      type: object
      properties:
        note:
          $ref: "#/components/schemas/Note"
        score:
          type: number
      required: [note, score]
    SearchResponse:
      type: object
      properties:
        query:
          type: string
        interpretedQuery:
          type: string
          nullable: true
          description: LLM-rewritten query, when the interpret-query flag is enabled
        searchMode:
          $ref: "#/components/schemas/SearchMode"
          description: The retrieval mode actually used
        hits:
          type: array
          items:
            $ref: "#/components/schemas/SearchHit"
      required: [query, hits, searchMode]
    BuildContextRequest:
      type: object
      properties:
        query:
          type: string
          minLength: 1
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 8
        types:
          type: array
          items:
            $ref: "#/components/schemas/NoteType"
          nullable: true
        synthesize:
          type: boolean
          default: false
          description: If true and the synthesize flag is enabled, the LLM produces a synthesis stored as a note
      required: [query]
    ContextHit:
      type: object
      properties:
        note:
          $ref: "#/components/schemas/Note"
        score:
          type: number
        via:
          type: string
          enum: [direct, related]
          description: "direct: matched by retriever; related: pulled in via note_links or shared entities"
        relation:
          type: string
          nullable: true
          description: "The typed relation that caused this hit to be included (only set when via=related and the hit came from note_links)"
        viaNoteId:
          type: string
          nullable: true
          description: "The seed note ID that this related note was linked from (only set when via=related and the hit came from note_links)"
        viaEntity:
          nullable: true
          description: "The entity and typed relation that caused this hit to be included (only set when via=related and the hit was pulled in via entity-graph expansion)"
          type: object
          properties:
            id:
              type: string
            type:
              type: string
            name:
              type: string
            relation:
              type: string
          required: [id, type, name, relation]
      required: [note, score, via]
    BuildContextResponse:
      type: object
      properties:
        query:
          type: string
        interpretedQuery:
          type: string
          nullable: true
        hits:
          type: array
          items:
            $ref: "#/components/schemas/ContextHit"
        bundleMarkdown:
          type: string
          description: Concatenated markdown of the selected notes, ready to feed to an agent
        synthesisNote:
          $ref: "#/components/schemas/Note"
          nullable: true
      required: [query, hits, bundleMarkdown]
