openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Memory Subsystem API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ingest
    description: Ingest raw text into the memory
  - name: notes
    description: Read structured notes
  - name: search
    description: Search structured notes
  - name: context
    description: Build context bundles for downstream agents
  - name: graph
    description: Query the entity knowledge graph directly
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ingest/text:
    post:
      operationId: ingestText
      tags: [ingest]
      summary: Ingest a raw text item and produce one or more structured notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestTextRequest"
      responses:
        "200":
          description: Notes produced from the raw item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestTextResponse"
  /notes/{id}:
    get:
      operationId: getNote
      tags: [notes]
      summary: Get a single note by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The requested note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /search:
    post:
      operationId: searchNotes
      tags: [search]
      summary: Search structured notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
  /graph/entities:
    get:
      operationId: queryGraphEntities
      tags: [graph]
      summary: Query typed entity↔entity relations directly from the knowledge graph
      description: |
        Returns entity relations (e.g. `works_at`, `attended`) scoped to the caller's tenant.
        Use this to answer questions like "who works at Replit?" or "who attended MIT?" without
        going through buildContext. All filters are optional; with no filters, returns the most
        recent/highest-confidence relations for the tenant.
      parameters:
        - name: entity
          in: query
          required: false
          schema:
            type: string
          description: |
            Entity name to anchor the query. Matched case-insensitively against the
            normalized entity name. Required if you want a meaningful "who works at X" answer.
        - name: entityType
          in: query
          required: false
          schema:
            type: string
          description: Filter the anchor entity by type (e.g. `organization`, `person`).
        - name: relation
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EntityRelationType"
          description: Filter by relation type (e.g. `works_at`).
        - name: direction
          in: query
          required: false
          schema:
            type: string
            enum: [outgoing, incoming, both]
            default: both
          description: |
            When `entity` is provided, controls which side of the relation it must appear on.
            `outgoing`: entity is the from-side ("X works_at ?"). `incoming`: entity is the to-side
            ("? works_at X"). `both` (default): either side. Ignored when `entity` is omitted.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Matching entity relations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphEntitiesResponse"
  /context/build:
    post:
      operationId: buildContext
      tags: [context]
      summary: Build a context bundle for a downstream agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildContextRequest"
      responses:
        "200":
          description: Context bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildContextResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
    NoteType:
      type: string
      enum: [raw_source, note, insight, decision, synthesis, entity]
    EntityRelationType:
      type: string
      description: Whitelisted entity↔entity relation types. Keep in sync with the server's VALID_ENTITY_RELATIONS set.
      enum:
        - works_at
        - attended
        - lives_in
        - located_in
        - friend_of
        - family_of
        - colleague_of
        - member_of
        - created_by
        - part_of
        - mentions
    SearchMode:
      type: string
      enum: [lexical, semantic, hybrid]
      description: "lexical: FTS only; semantic: vector similarity only; hybrid: RRF fusion of FTS + semantic (default)"
    Entity:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          description: e.g. person, project, concept, place, organization
        name:
          type: string
      required: [id, type, name]
    Note:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/NoteType"
        title:
          type: string
        body:
          type: string
        summary:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        sourceItemId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        entities:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
      required: [id, type, title, body, tags, createdAt, entities]
    IngestTextRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
        source:
          type: string
          nullable: true
          description: Optional free-form label of the source (e.g. "chat", "email")
        author:
          type: string
          nullable: true
      required: [text]
    IngestTextResponse:
      type: object
      properties:
        rawItemId:
          type: string
        notes:
          type: array
          items:
            $ref: "#/components/schemas/Note"
      required: [rawItemId, notes]
    SearchRequest:
      type: object
      properties:
        query:
          type: string
          minLength: 1
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        types:
          type: array
          items:
            $ref: "#/components/schemas/NoteType"
          nullable: true
        mode:
          $ref: "#/components/schemas/SearchMode"
          default: hybrid
          description: "Retrieval mode. Defaults to hybrid (RRF fusion of FTS + semantic). Existing clients omitting this field continue to work unchanged."
      required: [query]
    SearchHit:
      type: object
      properties:
        note:
          $ref: "#/components/schemas/Note"
        score:
          type: number
      required: [note, score]
    SearchResponse:
      type: object
      properties:
        query:
          type: string
        interpretedQuery:
          type: string
          nullable: true
          description: LLM-rewritten query, when the interpret-query flag is enabled
        searchMode:
          $ref: "#/components/schemas/SearchMode"
          description: The retrieval mode actually used
        hits:
          type: array
          items:
            $ref: "#/components/schemas/SearchHit"
      required: [query, hits, searchMode]
    BuildContextRequest:
      type: object
      properties:
        query:
          type: string
          minLength: 1
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 8
        types:
          type: array
          items:
            $ref: "#/components/schemas/NoteType"
          nullable: true
        synthesize:
          type: boolean
          default: false
          description: If true and the synthesize flag is enabled, the LLM produces a synthesis stored as a note
      required: [query]
    ContextHit:
      type: object
      properties:
        note:
          $ref: "#/components/schemas/Note"
        score:
          type: number
        via:
          type: string
          enum: [direct, related]
          description: "direct: matched by retriever; related: pulled in via note_links or shared entities"
        relation:
          type: string
          nullable: true
          description: "The typed relation that caused this hit to be included (only set when via=related and the hit came from note_links)"
        viaNoteId:
          type: string
          nullable: true
          description: "The seed note ID that this related note was linked from (only set when via=related and the hit came from note_links)"
        viaEntity:
          nullable: true
          description: "The entity and typed relation that caused this hit to be included (only set when via=related and the hit was pulled in via entity-graph expansion)"
          type: object
          properties:
            id:
              type: string
            type:
              type: string
            name:
              type: string
            relation:
              type: string
          required: [id, type, name, relation]
      required: [note, score, via]
    BuildContextResponse:
      type: object
      properties:
        query:
          type: string
        interpretedQuery:
          type: string
          nullable: true
        hits:
          type: array
          items:
            $ref: "#/components/schemas/ContextHit"
        bundleMarkdown:
          type: string
          description: Concatenated markdown of the selected notes, ready to feed to an agent
        synthesisNote:
          $ref: "#/components/schemas/Note"
          nullable: true
      required: [query, hits, bundleMarkdown]
    GraphEntityRef:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        name:
          type: string
      required: [id, type, name]
    GraphEntityRelation:
      type: object
      properties:
        relation:
          $ref: "#/components/schemas/EntityRelationType"
        from:
          $ref: "#/components/schemas/GraphEntityRef"
        to:
          $ref: "#/components/schemas/GraphEntityRef"
        sourceNoteId:
          type: string
          nullable: true
          description: ID of the note this relation was extracted from, if known. Use it to drill into the evidence.
        confidence:
          type: number
          description: Extraction confidence in [0, 1].
        createdAt:
          type: string
          format: date-time
      required: [relation, from, to, sourceNoteId, confidence, createdAt]
    GraphEntitiesResponse:
      type: object
      properties:
        query:
          type: object
          properties:
            entity:
              type: string
              nullable: true
            entityType:
              type: string
              nullable: true
            relation:
              type: string
              nullable: true
            direction:
              type: string
              enum: [outgoing, incoming, both]
          required: [entity, entityType, relation, direction]
        relations:
          type: array
          items:
            $ref: "#/components/schemas/GraphEntityRelation"
      required: [query, relations]
